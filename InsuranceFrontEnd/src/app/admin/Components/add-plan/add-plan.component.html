<!-- Table -->

<div class="wrapper">
  <app-admin-header></app-admin-header>
  <div class="container" id="addPlan">
    <app-page-header backClassName="ms-1">
      <h2 page-title class="page-title m-0">Register Insurance Plan</h2>
    </app-page-header>

    <form [formGroup]="addPlanForm">
      <div class="row">
        <div class="col text-center">
          <label for="PlanName" class="form-label">Plan Name</label>
          <input
            type="text"
            class="form-control mx-auto"
            style="max-width: 450px;"
            formControlName="planName"
            placeholder=" Enter Plan Name"
            aria-label="Plan name"
          />
          <br />
          <div class="error-div">
            <small
              *ngIf="
                addPlanForm.get('planName')?.dirty &&
                addPlanForm.get('planName')?.hasError('required')
              "
              class="text-danger"
              >*Plan Name is required.</small
            ><br />

            <small
              *ngIf="
                addPlanForm.get('planName')?.dirty &&
                addPlanForm.get('planName')?.hasError('onlyCharacters')
              "
              class="text-danger"
            >
              *{{
                addPlanForm.get("planName")?.getError("onlyCharacters").message
              }}</small
            >
          </div>
        </div>
      </div>
    </form>

    <div class="form-actions">
      <button type="button" class="btn btn-secondary action-btn" (click)="OnCancel()">
        Cancel
      </button>
      <button
        id="save"
        type="button"
        class="btn btn-primary action-btn"
        (click)="addPlan()"
      >
        Register
      </button>
    </div>
  </div>
</div>

<app-footer-other></app-footer-other>
