<!-- Table -->

<!-- Modal -->
<div class="wrapper">
  <app-admin-header></app-admin-header>
  <div class="container">
    <app-page-header backClassName="ms-1">
      <h2 page-title class="page-title m-0">Tax Settings</h2>
    </app-page-header>

    <form [formGroup]="taxPercentForm">
      <div class="row">
        <div class="col">
          <input
            type="number"
            formControlName="taxPercent"
            placeholder="Enter Tax Percent"
            [min]="0"
            aria-label="Tax Percent"
          />
          <br />
          <small
            *ngIf="
              taxPercentForm.get('taxPercent')?.dirty &&
              taxPercentForm.get('taxPercent')?.hasError('required')
            "
            class="text-danger"
            >*Field is required.</small
          >
          <small
            *ngIf="
              taxPercentForm.get('taxPercent')?.dirty &&
              taxPercentForm.get('taxPercent')?.hasError('pattern')
            "
            class="text-danger"
            >*Invalid input.</small
          >
        </div>
      </div>
    </form>

    <div class="row">
      <div class="col-12">
        <button id="save" type="button" class="submit" (click)="updateTax()">
          Update
        </button>
      </div>
    </div>
  </div>
</div>
<app-footer-other></app-footer-other>
