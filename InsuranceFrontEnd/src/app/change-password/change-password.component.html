<div class="wrapper">
<div *ngIf="isCustomer">
  <app-customer-header></app-customer-header>
</div>
<div *ngIf="isAdmin">
  <app-admin-header></app-admin-header>
</div>
<div *ngIf="isAgent">
  <app-agent-header></app-agent-header>
</div>
<div *ngIf="isEmployee">
  <app-employee-header></app-employee-header>
</div>
<div class="container">
    <app-page-header backClassName="ms-1">
      <h2 page-title class="page-title m-0">Change Password</h2>
    </app-page-header>
  


    <form class="row g-2" [formGroup]="changePasswordForm">
      <div class="col-md-12 ">
        <input type="text" formControlName="userName" placeholder="USER NAME*" /><br>
        <small 
        
        *ngIf="
          changePasswordForm.get('userName')?.dirty &&
          changePasswordForm.get('userName')?.hasError('required')
        "
        class="text-danger error"
        >*User Name is required.<br></small
      >
      </div>
      <div class="col-md-12">
        <div class="password-field">
          <input
            [type]="showCurrentPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="OLD PASSWORD*"
          />
          <button
            type="button"
            class="password-toggle"
            [attr.aria-label]="showCurrentPassword ? 'Hide password' : 'Show password'"
            (click)="showCurrentPassword = !showCurrentPassword"
          >
            <i [class]="showCurrentPassword ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>
          </button>
        </div><br>
        <small 
        *ngIf="
          changePasswordForm.get('password')?.dirty &&
          changePasswordForm.get('password')?.hasError('required')
        "
        class="text-danger error"
        > *Password is required.<br></small
      >
      </div>

      <div class="col-md-12">
        <div class="password-field">
          <input
            [type]="showNewPassword ? 'text' : 'password'"
            formControlName="newPassword"
            placeholder="NEW PASSWORD*"
          />
          <button
            type="button"
            class="password-toggle"
            [attr.aria-label]="showNewPassword ? 'Hide password' : 'Show password'"
            (click)="showNewPassword = !showNewPassword"
          >
            <i [class]="showNewPassword ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>
          </button>
        </div><br>
        <small 
        *ngIf="
          changePasswordForm.get('newPassword')?.dirty &&
          changePasswordForm.get('newPassword')?.hasError('required')
        "
        class="text-danger"
        >*New Password is required.<br></small
      >
      <small
      *ngIf="
        changePasswordForm.get('newPassword')?.dirty &&
        changePasswordForm.get('newPassword')?.hasError('passwordValidator')
      "
      class="text-danger"
      [innerHTML]="
        changePasswordForm.get('newPassword')?.getError('passwordValidator')
          .message
      "
    ></small>
      </div>

      <div class="col-12">
        <button type="submit" class="submit" (click)="updatePassword()">Change Password</button>
      </div>
    </form>

</div>
</div>
<app-footer-other></app-footer-other>
